# Cheap-lane CI: client build + pure-function unit tests only.
# No secrets, no database. The integration suite (staging DB, serialized,
# known-flaky on shared staging) stays a manual/local lane on purpose.
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  client-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build

  server-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json
      - run: npm ci
      - run: npm run test:unit
